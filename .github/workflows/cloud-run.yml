name: Cloud Run CI/CD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      skip_migrations:
        description: Skip the Cloud Run migration job
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write

env:
  NODE_VERSION: "22"
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID || 'dropcontrol-494022' }}
  GCP_REGION: ${{ vars.GCP_REGION || 'us-central1' }}
  CLOUD_RUN_SERVICE: ${{ vars.CLOUD_RUN_SERVICE || 'dropship-control' }}
  CLOUD_RUN_RUNTIME_SERVICE_ACCOUNT: ${{ vars.CLOUD_RUN_RUNTIME_SERVICE_ACCOUNT || '490152629905-compute@developer.gserviceaccount.com' }}
  CLOUD_SQL_INSTANCE: ${{ vars.CLOUD_SQL_INSTANCE || 'project-a7ab51c3-7d7a-4f8b-a6b:us-central1:drop-controler-db' }}
  PROFILE_IMAGE_BUCKET: ${{ vars.PROFILE_IMAGE_BUCKET || 'dropcontrol-494022-profile-images' }}
  APP_URL: ${{ vars.APP_URL || 'https://dropship-control-rwquuxvh6a-uc.a.run.app' }}
  ENABLE_TIKTOK_SHOP: ${{ vars.ENABLE_TIKTOK_SHOP || 'false' }}

jobs:
  checks:
    name: Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  deploy:
    name: Deploy Cloud Run
    runs-on: ubuntu-latest
    needs: checks
    if: github.event_name != 'pull_request'
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy
        shell: pwsh
        env:
          SKIP_MIGRATIONS: ${{ github.event.inputs.skip_migrations || 'false' }}
        run: |
          $extraArgs = @()

          if ($env:ENABLE_TIKTOK_SHOP -eq "true") {
            $extraArgs += "-EnableTikTokShop"
          }

          if ($env:SKIP_MIGRATIONS -eq "true") {
            $extraArgs += "-SkipMigrations"
          }

          ./deploy/cloud-run/deploy.ps1 `
            -ProjectId $env:GCP_PROJECT_ID `
            -Region $env:GCP_REGION `
            -ServiceName $env:CLOUD_RUN_SERVICE `
            -ServiceAccount $env:CLOUD_RUN_RUNTIME_SERVICE_ACCOUNT `
            -CloudSqlInstance $env:CLOUD_SQL_INSTANCE `
            -ProfileImageBucket $env:PROFILE_IMAGE_BUCKET `
            -AppUrl $env:APP_URL `
            -EnableGoogleOAuth `
            -AllowUnauthenticated `
            @extraArgs
