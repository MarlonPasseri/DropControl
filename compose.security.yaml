services:
  edge:
    image: nginx:1.27-alpine
    container_name: dropship-control-edge
    restart: unless-stopped
    depends_on:
      app:
        condition: service_started
    ports:
      - "${EDGE_PORT:-80}:80"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/nginx.conf:ro
      - edge_logs:/var/log/nginx
    networks:
      - edge_net
      - app_net
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  app:
    build:
      context: .
    container_name: dropship-control-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public"
      APP_URL: "${APP_URL:-http://localhost}"
      AUTH_URL: "${AUTH_URL:-http://localhost}"
      NEXTAUTH_URL: "${NEXTAUTH_URL:-http://localhost}"
      AUTH_TRUST_HOST: "true"
    expose:
      - "3000"
    depends_on:
      migrate:
        condition: service_completed_successfully
    volumes:
      - profile_uploads:/app/public/uploads/profile
      - next_cache:/app/.next/cache
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    networks:
      - app_net
      - db_net
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  migrate:
    build:
      context: .
      target: migrator
    container_name: dropship-control-migrate
    restart: "no"
    env_file:
      - .env
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public"
    depends_on:
      postgres:
        condition: service_healthy
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    networks:
      - db_net
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  postgres:
    image: postgres:16-alpine
    container_name: dropship-control-db-secure
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data_secure:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - db_net
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

networks:
  edge_net:
  app_net:
  db_net:
    internal: true

volumes:
  postgres_data_secure:
  profile_uploads:
  next_cache:
  edge_logs:
